<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprende a Sumar! 🧮</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="contenedor">
    <h1>¡Aprende a Sumar!</h1>
    
    <div class="pizarra">
        <!-- Parte de los 4 círculos -->
        <div class="grupo" onclick="contar(4)">
            <div class="circulo"></div><div class="circulo"></div>
            <div class="circulo"></div><div class="circulo"></div>
        </div>
        
        <span class="signo">+</span>

        <!-- Parte de los 3 círculos -->
        <div class="grupo" onclick="contar(3)">
            <div class="circulo"></div><div class="circulo"></div>
            <div class="circulo"></div>
        </div>

        <span class="signo">=</span>

        <!-- Resultado -->
        <div class="grupo">
            <div class="circulo azul"></div><div class="circulo azul"></div>
            <div class="circulo azul"></div><div class="circulo azul"></div>
            <div class="circulo azul"></div><div class="circulo azul"></div>
            <div class="circulo azul"></div>
        </div>
    </div>
</div>

    <script src="javascript.js"></script>
</body>
</html>
