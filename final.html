<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Felicidades! 🎉</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background: linear-gradient(135deg, #4caf50, #2196f3);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }
        .caja-principal {
            background: white;
            color: #333;
            padding: 40px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        .insignia-corona {
            font-size: 70px;
            margin: 0;
            animation: flotar 2s ease-in-out infinite;
        }
        /* Contenedor y animación de las 3 estrellas */
        .estrellas-contenedor {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0 20px 0;
        }
        .estrella {
            font-size: 45px;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
            animation: brillar 1.5s ease-in-out infinite alternate;
        }
        .estrella:nth-child(1) { animation-delay: 0s; }
        .estrella:nth-child(2) { animation-delay: 0.3s; font-size: 55px; transform: translateY(-5px); } /* Estrella del centro más grande */
        .estrella:nth-child(3) { animation-delay: 0.6s; }

        h2 {
            color: #4caf50;
            font-size: 42px;
            margin: 0 0 20px 0;
        }
        p {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #555;
        }
        .btn-volver {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px #1976d2;
            transition: all 0.2s;
        }
        .btn-volver:hover {
            background-color: #1976d2;
        }
        .btn-volver:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes brillar {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 8px #ffd700); }
        }
        #confeti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="confeti"></canvas>
    <div class="caja-principal">
        <div class="insignia-corona">👑🔥</div>
        
        <div class="estrellas-contenedor">
            <span class="estrella">⭐</span>
            <span class="estrella">⭐</span>
            <span class="estrella">⭐</span>
        </div>

        <h2>¡Lo Lograste!</h2>
        <p>¡Felicidades, has terminado todos los juegos con éxito!<br>
        Tu puntaje total es de <strong style="color:#f57f17; font-size:26px;" id="puntos-mostrar">0</strong> puntos<br>
        Eres una verdadera Leyenda de las Matemáticas 🏆</p>
        <button class="btn-volver" onclick="window.close()">🔄 Volver al Panel</button>
    </div>

    <script>
        // Obtener el puntaje enviado desde la página principal
        const parametros = new URLSearchParams(window.location.search);
        const puntosObtenidos = parametros.get('puntos') || 0;
        document.getElementById('puntos-mostrar').textContent = puntosObtenidos;

        // Efecto de confeti
        let duracion = 6 * 1000;
        let fin = Date.now() + duracion;
        let canvas = document.getElementById('confeti');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        (function lanzarConfeti() {
            confetti({
                particleCount: 6,
                angle: 60,
                spread: 60,
                origin: { x: 0, y: 0.6 },
                colors: ['#ffd700', '#ff5722', '#2196f3', '#4caf50', '#e91e63']
            });
            confetti({
                particleCount: 6,
                angle: 120,
                spread: 60,
                origin: { x: 1, y: 0.6 },
                colors: ['#ffd700', '#ff5722', '#2196f3', '#4caf50', '#e91e63']
            });
            if (Date.now() < fin) requestAnimationFrame(lanzarConfeti);
        }());

        // Mensaje de voz
        window.speechSynthesis.cancel();
        let mensaje = new SpeechSynthesisUtterance(
            `¡Felicidades! Has completado todos los juegos con éxito. Tu puntaje total es de ${puntosObtenidos} puntos. ¡Eres una leyenda de las matemáticas, muy bien hecho!`
        );
        mensaje.lang = 'es-ES';
        mensaje.rate = 1.05;
        window.speechSynthesis.speak(mensaje);
    </script>
</body>
</html>
