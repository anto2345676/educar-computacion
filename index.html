<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma estudiantil</title>
    <meta charset="UTF-8">
    <title>Plataforma Estudiantil</title>
    <link rel="stylesheet" href="CSS/estili.CSS">
    <!-- Imagen en la pestaña (favicon) -->
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>
    <div id="pantalla1" class="container">
    <div class="logo">🌟 APRENDE JUGANDO</div>
    
    <label>Tu Nombre:</label>
    <input type="text" id="inputNombre" placeholder="Escribe aquí...">
    
    <p>Selecciona tu Avatar:</p>
    <div class="avatar-grid">
        <div class="avatar" onclick="selectAvatar(this, '🦁')">🦁</div>
        <div class="avatar" onclick="selectAvatar(this, '🦊')">🦊</div>
        <div class="avatar" onclick="selectAvatar(this, '🤖')">🤖</div>
        <div class="avatar" onclick="selectAvatar(this, '🦄')">🦄</div>
        <div class="avatar" onclick="selectAvatar(this, '🐼')">🐼</div>
        <div class="avatar" onclick="selectAvatar(this, '🦖')">🦖</div>
    </div>

    <button onclick="validarIngreso()">Ingresar</button>
    <p id="mensajeError" class="error"></p>
</div>
   
    <script src="js/script.js"></script>

</body>
</html>
