<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Matemática: Juego 3</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Arial Rounded MT Bold', Arial, sans-serif; background-color: #e8f5e9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #marcador { position: absolute; top: 20px; right: 20px; background-color: #4caf50; color: white; padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #btn-parlante { position: absolute; top: 20px; left: 20px; font-size: 40px; cursor: pointer; background: none; border: none; }
        .pantalla-juego { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 80%; max-width: 700px; }
        h2 { color: #2e7d32; margin-top: 0; }
        .vitrina { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; background: #f1f8e9; padding: 20px; border-radius: 15px; border: 2px dashed #a5d6a7; min-height: 140px; }
        .tarjeta-producto { background: white; border: 2px solid #81c784; border-radius: 10px; padding: 10px; width: 110px; text-align: center; cursor: grab; }
        .tarjeta-producto .icono { font-size: 45px; }
        .tarjeta-producto .nombre { font-size: 16px; font-weight: bold; }
        .tarjeta-producto .precio { font-size: 18px; color: #e65100; font-weight: bold; }
        .zona-balanza { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .casilla-destino { width: 140px; height: 160px; border: 4px dashed #9e9e9e; border-radius: 15px; background-color: #f5f5f5; display: flex; align-items: center; justify-content: center; color: #757575; }
        .signo-central { font-size: 80px; font-weight: bold; color: #2e7d32; }
        .controles { display: flex; gap: 20px; justify-content: center; }
        button.btn-accion { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; }
        #btn-validar { background-color: #2ec4b6; }
        #btn-reintentar { background-color: #e71d36; display: none; }
        #btn-siguiente { background-color: #ff9f1c; display: none; }
        #mensaje { margin-top: 20px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn-parlante" onclick="leerIndicaciones()">🔊</button>
    <div id="marcador">⭐ Puntos: <span id="puntos">0</span></div>

    <div class="pantalla-juego">
        <h2>Juego 3: Grandes Valores</h2>
        <p style="font-weight: bold; color: #555;">¡Compara con atención! Arrastra los objetos para respetar la condición MENOR QUE (&lt;).</p>
        
        <div class="vitrina" id="vitrina-productos"></div>

        <div class="zona-balanza">
            <div class="casilla-destino" id="casilla-izquierda" ondragover="permitirSoltar(event)" ondrop="soltarProducto(event, 'izq')">Coloca aquí</div>
            <div class="signo-central">&lt;</div>
            <div class="casilla-destino" id="casilla-derecha" ondragover="permitirSoltar(event)" ondrop="soltarProducto(event, 'der')">Coloca aquí</div>
        </div>

        <div class="controles">
            <button class="btn-accion" id="btn-validar" onclick="validarJuego()">Validar</button>
            <button class="btn-accion" id="btn-reintentar" onclick="reintentar()">Volver a intentar</button>
            <button class="btn-accion" id="btn-siguiente" onclick="siguiente()">Siguiente Juego</button>
        </div>
        <div id="mensaje"></div>
    </div>

    <script>
        const productos = [
            { id: "p5", nombre: "Bicicleta", precio: 8990, icono: "🚲" },
            { id: "p6", nombre: "Libro", precio: 3500, icono: "📚" }
        ];

        let puntaje = parseInt(localStorage.getItem("puntajeAcumulado")) || 0;
        let prodIzq = null, prodDer = null, arrastrado = null;

        document.getElementById("puntos").innerText = puntaje;
        cargarProductos();

        function cargarProductos() {
            const vitrina = document.getElementById("vitrina-productos");
            vitrina.innerHTML = "";
            productos.forEach(p => {
                const div = document.createElement("div");
                div.className = "tarjeta-producto";
                div.id = p.id;
                div.draggable = true;
                div.ondragstart = () => { arrastrado = p; leerTexto(`Llevando ${p.nombre}`); };
                div.onclick = () => leerTexto(`${p.nombre}, cuesta ${p.precio} pesos`);
                div.innerHTML = `<div class="icono">${p.icono}</div><div class="nombre">${p.nombre}</div><div class="precio">$${p.precio}</div>`;
                vitrina.appendChild(div);
            });
        }

        function permitirSoltar(ev) { ev.preventDefault(); }

        function soltarProducto(ev, lado) {
            ev.preventDefault();
            const el = document.getElementById(arrastrado.id);
            ev.currentTarget.innerHTML = "";
            ev.currentTarget.appendChild(el);
            ev.currentTarget.style.backgroundColor = "#e8f5e9";
            if(lado === 'izq') prodIzq = arrastrado; else prodDer = arrastrado;
            leerTexto(`Pusiste ${arrastrado.nombre}`);
        }

        function validarJuego() {
            if(!prodIzq || !prodDer) { leerTexto("Coloca ambos productos."); return; }
            if(prodIzq.precio < prodDer.precio) {
                document.getElementById("mensaje").innerText = "¡Excelente! El libro es menor que la bicicleta.";
                document.getElementById("mensaje").style.color = "green";
                leerTexto("Muy bien, correcto. Presiona siguiente juego.");
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-siguiente").style.display = "inline-block";
            } else {
                document.getElementById("mensaje").innerText = "¡Inténtalo nuevamente!";
                document.getElementById("mensaje").style.color = "red";
                leerTexto("Inténtalo nuevamente.");
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-reintentar").style.display = "inline-block";
            }
        }

        function reintentar() {
            prodIzq = null; prodDer = null;
            document.getElementById("casilla-izquierda").innerHTML = "Coloca aquí";
            document.getElementById("casilla-derecha").innerHTML = "Coloca aquí";
            document.getElementById("casilla-izquierda").style.backgroundColor = "#f5f5f5";
            document.getElementById("casilla-derecha").style.backgroundColor = "#f5f5f5";
            document.getElementById("btn-validar").style.display = "inline-block";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("mensaje").innerText = "";
            cargarProductos();
        }

        function siguiente() {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => {
                puntaje += 10;
                localStorage.setItem("puntajeAcumulado", puntaje);
                window.location.href = "juego4.html"; // Redirecciona de forma secuencial al Juego 4
            }, 600);
        }

        function leerTexto(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='es-ES'; window.speechSynthesis.speak(u); }
        function leerIndicaciones() { leerTexto("Arrastra los productos para que el de la izquierda sea menor que el de la derecha."); }
    </script>
</body>
</html>
