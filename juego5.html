<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Matemática: Juego 5</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background-color: #e8f5e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #marcador {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #btn-parlante {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .pantalla-juego {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 700px;
        }
        h2 { color: #2e7d32; margin-top: 0; }
        .vitrina {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            background: #f1f8e9;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #a5d6a7;
            min-height: 140px;
        }
        .tarjeta-producto {
            background: white;
            border: 2px solid #81c784;
            border-radius: 10px;
            padding: 10px;
            width: 110px;
            text-align: center;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tarjeta-producto .icono { font-size: 45px; margin-bottom: 5px; }
        .tarjeta-producto .nombre { font-size: 16px; font-weight: bold; color: #333; }
        .tarjeta-producto .precio { font-size: 18px; color: #e65100; font-weight: bold; }
        .zona-balanza { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .casilla-destino {
            width: 140px;
            height: 160px;
            border: 4px dashed #9e9e9e;
            border-radius: 15px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #757575;
            overflow: hidden;
        }
        .signo-central { font-size: 80px; font-weight: bold; color: #2e7d32; width: 80px; }
        .controles { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .btn-accion { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; }
        #btn-validar { background-color: #2ec4b6; }
        #btn-reintentar { background-color: #e71d36; display: none; }
        #btn-siguiente { background-color: #ff9f1c; display: none; }
        #mensaje { margin-top: 20px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn-parlante" onclick="leerIndicaciones()">🔊</button>
    <div id="marcador">⭐ Puntos Partida: <span id="puntos">0</span></div>

    <div class="pantalla-juego">
        <h2 id="titulo-nivel">Nivel 1</h2>
        <p style="font-weight: bold; color: #555;">Productos disponibles (Arrástralos hacia abajo):</p>
        <div class="vitrina" id="vitrina-productos"></div>

        <div class="zona-balanza">
            <div class="casilla-destino" id="casilla-izquierda" ondragover="permitirSoltar(event)" ondrop="soltarProducto(event, 'izq')">Coloca aquí</div>
            <div class="signo-central" id="signo-fijo">?</div>
            <div class="casilla-destino" id="casilla-derecha" ondragover="permitirSoltar(event)" ondrop="soltarProducto(event, 'der')">Coloca aquí</div>
        </div>

        <div class="controles">
            <button class="btn-accion" id="btn-validar" onclick="validarTienda()">Validar</button>
            <button class="btn-accion" id="btn-reintentar" onclick="reintentarNivel()">Volver a intentar</button>
            <button class="btn-accion" id="btn-siguiente" onclick="siguienteNivel()">Siguiente Nivel</button>
        </div>
        <div id="mensaje"></div>
    </div>

    <script>
        const niveles = [
            { signo: ">", p1: { id: "p1", nombre: "Leche", precio: 1200, icono: "🥛" }, p2: { id: "p2", nombre: "Pan", precio: 800, icono: "🍞" } },
            { signo: "<", p1: { id: "p3", nombre: "Manzana", precio: 500, icono: "🍎" }, p2: { id: "p4", nombre: "Chocolate", precio: 1500, icono: "🍫" } },
            { signo: ">", p1: { id: "p5", nombre: "Zapatos", precio: 8500, icono: "👟" }, p2: { id: "p6", nombre: "Calcetines", precio: 2300, icono: "🧦" } },
            { signo: "<", p1: { id: "p7", nombre: "Lápiz", precio: 450, icono: "✏️" }, p2: { id: "p8", nombre: "Mochila", precio: 9990, icono: "🎒" } }
        ];

        let nivelActual = 0;
        let puntajeJuegoActual = 0;
        let productoEnIzquierda = null;
        let productoEnDerecha = null;
        let productoSiendoArrastrado = null;

        cargarNivel();

        function cargarNivel() {
            if (nivelActual >= niveles.length) {
                terminarJuego();
                return;
            }

            document.getElementById("puntos").innerText = puntajeJuegoActual;
            document.getElementById("titulo-nivel").innerText = `Nivel ${nivelActual + 1}`;
            document.getElementById("signo-fijo").innerText = niveles[nivelActual].signo;
            
            productoEnIzquierda = null;
            productoEnDerecha = null;
            
            const casIzq = document.getElementById("casilla-izquierda");
            const casDer = document.getElementById("casilla-derecha");
            casIzq.innerHTML = "Coloca aquí";
            casDer.innerHTML = "Coloca aquí";
            casIzq.style.backgroundColor = "#f5f5f5";
            casDer.style.backgroundColor = "#f5f5f5";

            document.getElementById("btn-validar").style.display = "inline-block";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("btn-siguiente").style.display = "none";
            document.getElementById("mensaje").innerText = "";

            const vitrina = document.getElementById("vitrina-productos");
            vitrina.innerHTML = "";

            vitrina.appendChild(crearTarjetaHTML(niveles[nivelActual].p1));
            vitrina.appendChild(crearTarjetaHTML(niveles[nivelActual].p2));
        }

        function crearTarjetaHTML(prod) {
            const div = document.createElement("div");
            div.className = "tarjeta-producto";
            div.id = prod.id;
            div.draggable = true;
            div.ondragstart = (e) => { productoSiendoArrastrado = prod; e.dataTransfer.setData("text/plain", prod.id); };
            div.onclick = () => leerTexto(`${prod.nombre}, cuesta ${prod.precio} pesos`);
            div.innerHTML = `<div class="icono">${prod.icono}</div><div class="nombre">${prod.nombre}</div><div class="precio">$${prod.precio}</div>`;
            return div;
        }

        function permitirSoltar(ev) { ev.preventDefault(); }

        function soltarProducto(ev, lado) {
            ev.preventDefault();
            if (!productoSiendoArrastrado) return;

            if (lado === 'izq' && productoEnDerecha && productoEnDerecha.id === productoSiendoArrastrado.id) {
                productoEnDerecha = null; document.getElementById("casilla-derecha").innerHTML = "Coloca aquí"; document.getElementById("casilla-derecha").style.backgroundColor = "#f5f5f5";
            }
            if (lado === 'der' && productoEnIzquierda && productoEnIzquierda.id === productoSiendoArrastrado.id) {
                productoEnIzquierda = null; document.getElementById("casilla-izquierda").innerHTML = "Coloca aquí"; document.getElementById("casilla-izquierda").style.backgroundColor = "#f5f5f5";
            }

            const elemento = document.getElementById(productoSiendoArrastrado.id);
            ev.currentTarget.innerHTML = "";
            ev.currentTarget.appendChild(elemento);
            ev.currentTarget.style.backgroundColor = "#e8f5e9";

            if (lado === 'izq') productoEnIzquierda = productoSiendoArrastrado;
            else productoEnDerecha = productoSiendoArrastrado;

            leerTexto(`Pusiste ${productoSiendoArrastrado.nombre}`);
            productoSiendoArrastrado = null;
        }

        function validarTienda() {
            if (!productoEnIzquierda || !productoEnDerecha) {
                leerTexto("Coloca un producto en cada casilla."); return;
            }
            const signo = niveles[nivelActual].signo;
            let esCorrecto = (signo === ">" && productoEnIzquierda.precio > productoEnDerecha.precio) || (signo === "<" && productoEnIzquierda.precio < productoEnDerecha.precio);

            if (esCorrecto) {
                document.getElementById("mensaje").innerText = "¡Excelente! Orden correcto.";
                document.getElementById("mensaje").style.color = "green";
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-siguiente").style.display = "inline-block";
                leerTexto("¡Excelente! Presiona siguiente nivel.");
            } else {
                document.getElementById("mensaje").innerText = "¡Oh, algo está mal!";
                document.getElementById("mensaje").style.color = "red";
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-reintentar").style.display = "inline-block";
                leerTexto("Inténtalo de nuevo.");
            }
        }

        function reintentarNivel() { cargarNivel(); }

        function siguienteNivel() {
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 } });
            setTimeout(() => {
                puntajeJuegoActual += 10;
                nivelActual++;
                cargarNivel();
            }, 600);
        }

        function terminarJuego() {
            window.speechSynthesis.cancel();
            let acumulado = parseInt(localStorage.getItem("puntajeAcumulado")) || 0;
            localStorage.setItem("puntajeAcumulado", acumulado + puntajeJuegoActual);
            window.location.href = "4basico.html"; // Retorno coordinado
        }

        function leerTexto(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'es-ES'; window.speechSynthesis.speak(u); }
        function leerIndicaciones() { const s = niveles[nivelActual].signo === ">" ? "mayor que" : "menor que"; leerTexto(`El signo central es ${s}. Arrastra los elementos para cumplir la regla.`); }
    </script>
</body>
</html>
