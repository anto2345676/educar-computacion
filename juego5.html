<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Matemática: Juego 5 (Globos Relámpago)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Arial Rounded MT Bold', Arial, sans-serif; background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #marcador { position: absolute; top: 20px; right: 20px; background-color: #00acc1; color: white; padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #btn-parlante { position: absolute; top: 20px; left: 20px; font-size: 40px; cursor: pointer; background: none; border: none; padding: 5px; transition: all 0.3s; }
        
        /* Animación de alerta llamativa para captar la atención del estudiante */
        @keyframes parpadeoFuerte {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #fff); background-color: transparent; }
            50% { transform: scale(1.25); filter: drop-shadow(0 0 25px #00acc1); background-color: rgba(0, 172, 193, 0.3); border-radius: 50%; }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #fff); background-color: transparent; }
        }

        .parlante-alerta {
            animation: parpadeoFuerte 0.8s ease-in-out infinite;
        }

        .pantalla-juego, .pantalla-final { text-align: center; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); width: 85%; max-width: 700px; box-sizing: border-box; }
        .pantalla-final { display: none; }
        h2 { color: #006064; margin-top: 0; }

        /* Panel de Operación */
        .panel-operacion { display: flex; align-items: center; justify-content: center; gap: 20px; background: #f5f5f5; border: 3px solid #b2ebf2; padding: 25px; border-radius: 20px; margin: 25px 0; min-height: 100px; }
        .bloque-num { font-size: 38px; font-weight: bold; color: #263238; padding: 10px 15px; border-radius: 10px; background: white; border: 2px solid #cfd8dc; transition: transform 0.3s ease; }
        .incognita-central { width: 90px; height: 90px; background: #006064; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 45px; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); transition: transform 0.3s ease; }

        /* Zona de Globos Voladores */
        .cielo-globos { display: flex; justify-content: space-around; align-items: center; height: 180px; margin-top: 20px; background: linear-gradient(to bottom, #e0f7fa, #fff); border-radius: 15px; border: 2px dashed #00bcd4; padding: 10px; position: relative; overflow: hidden; }
        
        .globo { width: 95px; height: 115px; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; color: white; cursor: pointer; position: relative; user-select: none; transition: transform 0.2s ease, opacity 0.2s ease, filter 0.2s ease; animation: flotarMovimiento 3s ease-in-out infinite alternate; }
        
        /* Pequeño nudo del globo abajo */
        .globo::after { content: ""; position: absolute; bottom: -8px; left: 42px; border-left: 6px solid transparent; border-right: 6px solid transparent; transition: opacity 0.1s ease; }
        
        /* Efecto de Reventado */
        .globo.reventado {
            transform: scale(1.6) !important;
            opacity: 0 !important;
            filter: blur(5px);
            pointer-events: none;
        }
        .globo.reventado::after {
            opacity: 0 !important;
        }
        
        /* Colores individuales de globos */
        #globo-mayor { background-color: #ff5252; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.15); }
        #globo-mayor::after { border-bottom: 8px solid #ff5252; }
        #globo-igual { background-color: #4caf50; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.15); }
        #globo-igual::after { border-bottom: 8px solid #4caf50; }
        #globo-menor { background-color: #2196f3; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.15); }
        #globo-menor::after { border-bottom: 8px solid #2196f3; }

        /* Variaciones de velocidad de animación para desfasar los globos */
        #globo-mayor { animation-delay: 0s; }
        #globo-igual { animation-delay: 0.6s; }
        #globo-menor { animation-delay: 1.2s; }

        @keyframes flotarMovimiento {
            0% { transform: translateY(15px) rotate(-3deg); }
            100% { transform: translateY(-15px) rotate(3deg); }
        }

        /* Animación de Pálpito corporativa */
        @keyframes palpitar {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 15px rgba(0, 96, 100, 0.4); }
            100% { transform: scale(1); }
        }
        .efecto-hablar {
            animation: palpitar 0.8s ease-in-out 2 !important;
            border-color: #00bcd4 !important;
            color: #00bcd4 !important;
        }

        .controles { display: flex; gap: 20px; justify-content: center; margin-top: 25px; }
        button.btn-accion { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; box-shadow: 0 4px rgba(0,0,0,0.2); }
        button.btn-accion:active { transform: translateY(2px); box-shadow: none; }
        #btn-siguiente { background-color: #ff9f1c; display: none; }
        #btn-reintentar { background-color: #e71d36; display: none; }
        .btn-menu { background-color: #795548; }

        #mensaje { margin-top: 20px; font-size: 24px; font-weight: bold; }
        .resultado-puntos { font-size: 32px; color: #006064; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn-parlante" class="parlante-alerta" onclick="leerIndicaciones()">🔊</button>
    <div id="marcador">⭐ Puntos: <span id="puntos">0</span></div>

    <div class="pantaya-juego" id="contenedor-juego" class="pantalla-juego">
        <div class="pantalla-juego">
            <h2 id="titulo-juego">Juego 5: Los Globos Relámpago</h2>
            <p id="instrucciones-juego" style="font-weight: bold; color: #555;"></p>
            
            <div class="panel-operacion">
                <div class="bloque-num" id="bloque-izq">0</div>
                <div class="incognita-central" id="bloque-signo">?</div>
                <div class="bloque-num" id="bloque-der">0</div>
            </div>

            <p style="font-weight: bold; color: #006064;">¡Revienta el globo con la respuesta correcta!</p>
            <div class="cielo-globos" id="zona-vuelo">
                <div class="globo" id="globo-mayor" onclick="intentarReviento(this, '>')">&gt;</div>
                <div class="globo" id="globo-igual" onclick="intentarReviento(this, '=')">=</div>
                <div class="globo" id="globo-menor" onclick="intentarReviento(this, '<')">&lt;</div>
            </div>

            <div class="controles">
                <button class="btn-accion" id="btn-reintentar" onclick="reintentar()">Volver a intentar</button>
                <button class="btn-accion" id="btn-siguiente" onclick="siguienteNivel()">Siguiente Desafío</button>
            </div>
            <div id="mensaje"></div>
        </div>
    </div>

    <div class="contenedor-isla pantalla-final" id="contenedor-final">
        <div class="pantalla-final" id="bloque-final-estilo" style="display: block;">
            <h2>🎈 ¡Festival de Globos Completado! 🎈</h2>
            <p style="font-size: 20px;">¡Magnífico! Tu agilidad mental matemática resolvió todos los niveles.</p>
            <div class="resultado-puntos">Ganaste +<span id="puntos-final">0</span> puntos para tu registro</div>
            <p id="mensaje-final-evaluacion" style="font-size: 22px; font-weight: bold;"></p>
            
            <div class="controles" style="margin-top: 30px; flex-direction: column; gap: 15px;">
                <button class="btn-accion btn-menu" onclick="irAMenu()">🏠 Volver al menú de 4° Básico</button>
            </div>
        </div>
    </div>

    <script>
        const niveles = [
            {
                titulo: "Juego 5 - Nivel 1: Sumas v/s Precios",
                instrucciones: "Resuelve mentalmente la operación para saber qué lado es mayor.",
                audioSecuencia: [
                    { texto: "En el lado izquierdo hay tres mil quinientos pesos.", resaltar: "bloque-izq" },
                    { texto: "En el lado derecho hay una suma de dos mil más mil quinientos pesos.", resaltar: "bloque-der" },
                    { texto: "Calcula y pincha el globo del signo correcto en el cielo.", resaltar: "zona-vuelo" }
                ],
                textoIzq: "3.500",
                textoDer: "2.000 + 1.500",
                valIzq: 3500,
                valDer: 3500,
                correcto: "=",
                exito: "¡Perfecto! Tres mil quinientos es IGUAL (=) a dos mil más mil quinientos.",
                fallo: "¡Suma con cuidado! Dos mil más mil quinientos da exactamente tres mil quinientos."
            },
            {
                titulo: "Juego 5 - Nivel 2: Desafío de la Resta",
                instrucciones: "¡Rápido! Resta los valores antes de elegir tu globo.",
                audioSecuencia: [
                    { texto: "A la izquierda tenemos un total directo de cinco mil pesos.", resaltar: "bloque-izq" },
                    { texto: "A la derecha tenemos ocho mil menos cuatro mil pesos.", resaltar: "bloque-der" },
                    { texto: "Revienta el globo operador que corresponda.", resaltar: "zona-vuelo" }
                ],
                textoIzq: "5.000",
                textoDer: "8.000 - 4.000",
                valIzq: 5000,
                valDer: 4000,
                correcto: ">",
                exito: "¡Excelente! Cinco mil es MAYOR QUE (>) cuatro mil.",
                fallo: "Ojo: Ocho mil menos cuatro mil resulta en cuatro mil. Cinco mil le gana."
            },
            {
                titulo: "Juego 5 - Nivel 3: Grandes Centenas",
                instrucciones: "Analiza bien el valor posicional de las cantidades numéricas.",
                audioSecuencia: [
                    { texto: "Lado izquierdo: doce mil cuatrocientos pesos.", resaltar: "bloque-izq" },
                    { texto: "Lado derecho: doce mil setecientos pesos.", resaltar: "bloque-der" },
                    { texto: "Busca rápidamente el globo correcto.", resaltar: "zona-vuelo" }
                ],
                textoIzq: "12.400",
                textoDer: "12.700",
                valIzq: 12400,
                valDer: 12700,
                correcto: "<",
                exito: "¡Impresionante! Doce mil cuatrocientos es MENOR QUE (<) doce mil setecientos.",
                fallo: "Compara las centenas: cuatrocientos es menor que setecientos."
            },
            {
                titulo: "Juego 5 - Nivel 4: El Gran Reto Final",
                instrucciones: "¡Último nivel! Concentración total en los dígitos acumulados.",
                audioSecuencia: [
                    { texto: "Izquierda: veinticinco mil más cinco mil.", resaltar: "bloque-izq" },
                    { texto: "Derecha: un billete limpio de treinta y un mil.", resaltar: "bloque-der" },
                    { texto: "Finaliza el juego pinchando el último globo.", resaltar: "zona-vuelo" }
                ],
                textoIzq: "25.000 + 5.000",
                textoDer: "31.000",
                valIzq: 30000,
                valDer: 31000,
                correcto: "<",
                exito: "¡Espectacular! Treinta mil es MENOR QUE (<) treinta y un mil.",
                fallo: "Veinticinco mil más cinco mil es treinta mil. Treinta y un mil es mayor."
            }
        ];

        let nivelActual = 0;
        let puntosGanadosEsteJuego = 0;
        let juegoBloqueado = false;

        function obtenerPuntajeGlobal() {
            return parseInt(localStorage.getItem("puntajeAcumulado")) || 0;
        }

        function actualizarMarcadorVisual() {
            document.getElementById("puntos").innerText = obtenerPuntajeGlobal();
        }

        function reproducirSonidoPop() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.08);
                
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.08);
            } catch (e) { console.log("AudioContext no soportado aún."); }
        }

        function cargarNivel(numNivel) {
            if (numNivel >= niveles.length) {
                mostrarPantallaFinal();
                return;
            }

            const datos = niveles[numNivel];
            juegoBloqueado = false;

            document.getElementById("titulo-juego").innerText = datos.titulo;
            document.getElementById("instrucciones-juego").innerText = datos.instrucciones;
            document.getElementById("bloque-izq").innerText = datos.textoIzq;
            document.getElementById("bloque-der").innerText = datos.textoDer;
            document.getElementById("bloque-signo").innerText = "?";
            document.getElementById("mensaje").innerText = "";

            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("btn-siguiente").style.display = "none";
            
            // Activamos la animación del parlante al cambiar o reiniciar un nivel
            document.getElementById("btn-parlante").classList.add("parlante-alerta");

            const globos = document.querySelectorAll('.globo');
            globos.forEach(g => {
                g.classList.remove('reventado');
            });

            document.getElementById("zona-vuelo").style.pointerEvents = "auto";
            document.getElementById("zona-vuelo").style.opacity = "1";

            actualizarMarcadorVisual();
        }

        function intentarReviento(elementoGlobo, signo) {
            if (juegoBloqueado) return;
            juegoBloqueado = true;

            document.getElementById("zona-vuelo").style.pointerEvents = "none";

            reproducirSonidoPop();
            elementoGlobo.classList.add('reventado');

            setTimeout(() => {
                procesarRespuesta(signo);
            }, 200);
        }

        function procesarRespuesta(signo) {
            const datos = niveles[nivelActual];
            document.getElementById("bloque-signo").innerText = signo;

            if (signo === datos.correcto) {
                confetti({ particleCount: 140, spread: 70, origin: { y: 0.6 } });
                document.getElementById("mensaje").innerText = datos.exito;
                document.getElementById("mensaje").style.color = "green";
                leerTextoSimple("¡Excelente respuesta! Avanza al siguiente nivel.");

                puntosGanadosEsteJuego += 10;
                let nuevoTotal = obtenerPuntajeGlobal() + 10;
                localStorage.setItem("puntajeAcumulado", nuevoTotal);
                actualizarMarcadorVisual();

                document.getElementById("btn-siguiente").style.display = "inline-block";
            } else {
                document.getElementById("mensaje").innerText = datos.fallo;
                document.getElementById("mensaje").style.color = "red";
                document.getElementById("zona-vuelo").style.opacity = "0.5";
                leerTextoSimple("Oh, ese globo no tenía la respuesta correcta. Inténtalo de nuevo.");

                document.getElementById("btn-reintentar").style.display = "inline-block";
            }
        }

        function reintentar() {
            cargarNivel(nivelActual);
        }

        function siguienteNivel() {
            window.speechSynthesis.cancel();
            nivelActual++;
            cargarNivel(nivelActual);
        }

        function mostrarPantallaFinal() {
            document.getElementById("contenedor-juego").style.display = "none";
            document.getElementById("contenedor-final").style.display = "block";
            document.getElementById("puntos-final").innerText = puntosGanadosEsteJuego;
            document.getElementById("btn-parlante").classList.remove("parlante-alerta");

            const txtEval = document.getElementById("mensaje-final-evaluacion");
            txtEval.innerText = "🏆 ¡Fabuloso! Tus puntos se sumaron correctamente.";
            txtEval.style.color = "green";

            leerTextoSimple("¡Felicitaciones! Completaste el desafío de los globos. Presiona el botón para salir.");
        }

        function leerSecuencia(secuencia, indice = 0) {
            if (indice >= secuencia.length) return;

            const paso = secuencia[indice];
            const elementoHTML = document.getElementById(paso.resaltar);

            const u = new SpeechSynthesisUtterance(paso.texto);
            u.lang = 'es-ES';

            u.onstart = () => {
                if (elementoHTML) elementoHTML.classList.add("efecto-hablar");
            };

            u.onend = () => {
                if (elementoHTML) elementoHTML.classList.remove("efecto-hablar");
                leerSecuencia(secuencia, indice + 1);
            };

            window.speechSynthesis.speak(u);
        }

        function leerTextoSimple(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-ES';
            window.speechSynthesis.speak(u);
        }

        function leerIndicaciones() {
            window.speechSynthesis.cancel();
            
            // Apagamos la alerta visual del botón de audio al ser presionado por el niño
            document.getElementById("btn-parlante").classList.remove("parlante-alerta");

            document.getElementById("bloque-izq").classList.remove("efecto-hablar");
            document.getElementById("bloque-der").classList.remove("efecto-hablar");
            document.getElementById("zona-vuelo").classList.remove("efecto-hablar");

            if(document.getElementById("contenedor-juego").style.display !== "none") {
                leerSecuencia(niveles[nivelActual].audioSecuencia);
            } else {
                leerTextoSimple("Fin de la partida. Regresa al menú usando el botón marrón.");
            }
        }

        window.onload = () => {
            document.getElementById("contenedor-final").style.display = "none";
            cargarNivel(0);
        };
    </script>
</body>
</html>
