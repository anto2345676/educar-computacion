<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Matemática: Mayor y Menor</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background-color: #e8f5e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Marcador de puntaje */
        #marcador {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Botón del parlante */
        #btn-parlante {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.2s;
        }
        #btn-parlante:hover { transform: scale(1.1); }

        .pantalla-juego {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 700px;
        }

        h2 { color: #2e7d32; margin-top: 0; }

        /* Vitrina de productos disponibles */
        .vitrina {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            background: #f1f8e9;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #a5d6a7;
            min-height: 140px;
        }

        /* Estilo de cada tarjeta de producto */
        .tarjeta-producto {
            background: white;
            border: 2px solid #81c784;
            border-radius: 10px;
            padding: 10px;
            width: 110px;
            text-align: center;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            user-select: none;
        }
        .tarjeta-producto:active { cursor: grabbing; }
        .tarjeta-producto .icono { font-size: 45px; margin-bottom: 5px; }
        .tarjeta-producto .nombre { font-size: 16px; font-weight: bold; color: #333; }
        .tarjeta-producto .precio { font-size: 18px; color: #e65100; font-weight: bold; }

        /* Zona de pesaje / comparación */
        .zona-balanza {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Casillas donde se deben soltar los productos */
        .casilla-destino {
            width: 140px;
            height: 160px;
            border: 4px dashed #9e9e9e;
            border-radius: 15px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #757575;
        }

        .signo-central {
            font-size: 80px;
            font-weight: bold;
            color: #2e7d32;
            width: 80px;
        }

        /* Botones de acción */
        .controles {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        button.btn-accion {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px rgba(0,0,0,0.2);
        }
        
        #btn-validar { background-color: #2ec4b6; }
        #btn-reintentar { background-color: #e71d36; display: none; }
        #btn-siguiente { background-color: #ff9f1c; display: none; }
        #btn-reiniciar-todo { background-color: #7209b7; display: none; }
        
        button.btn-accion:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #mensaje {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btn-parlante" onclick="leerIndicaciones()" title="Escuchar indicaciones">🔊</button>

    <div id="marcador">Puntos: <span id="puntos">0</span></div>

    <div class="pantalla-juego">
        <h2 id="titulo-nivel">Nivel 1</h2>
        
        <p style="font-weight: bold; color: #555;">Productos disponibles (Arrástralos hacia abajo):</p>
        <div class="vitrina" id="vitrina-productos"></div>

        <div class="zona-balanza">
            <div class="casilla-destino" id="casilla-izquierda" ondragover="permitirSoltar(event)" ondrop="soltarProducto(event, 'izq')">Coloca aquí</div>
            <div class="signo-central" id="signo-fijo">?</div>
            <div class="casilla-destino" id="casilla-derecha" ondragover="permitirSoltar(event)" ondrop="soltarProducto(event, 'der')">Coloca aquí</div>
        </div>

        <div class="controles">
            <button class="btn-accion" id="btn-validar" onclick="validarTienda()">Validar</button>
            <button class="btn-accion" id="btn-reintentar" onclick="reintentarNivel()">Volver a intentar</button>
            <button class="btn-accion" id="btn-siguiente" onclick="siguienteNivel()">Siguiente Nivel</button>
            <button class="btn-accion" id="btn-reiniciar-todo" onclick="reiniciarJuegoCompleto()">Volver a jugar</button>
        </div>

        <div id="mensaje"></div>
    </div>

    <script>
        // Banco de niveles del supermercado con sus productos y el signo que deben respetar
        const niveles = [
            {
                signo: ">", // Izquierda debe ser mayor que Derecha
                p1: { id: "p1", nombre: "Leche", precio: 1200, icono: "🥛" },
                p2: { id: "p2", nombre: "Pan", precio: 800, icono: "🍞" }
            },
            {
                signo: "<", // Izquierda debe ser menor que Derecha
                p1: { id: "p3", nombre: "Manzana", precio: 500, icono: "🍎" },
                p2: { id: "p4", nombre: "Chocolate", precio: 1500, icono: "🍫" }
            },
            {
                signo: ">", 
                p1: { id: "p5", nombre: "Zapatos", precio: 8500, icono: "👟" },
                p2: { id: "p6", nombre: "Calcetines", precio: 2300, icono: "🧦" }
            },
            {
                signo: "<",
                p1: { id: "p7", nombre: "Lápiz", precio: 450, icono: "✏️" },
                p2: { id: "p8", nombre: "Mochila", precio: 9990, icono: "🎒" }
            }
        ];

        let nivelActual = 0;
        let puntaje = 0;
        
        // Variables para guardar qué producto se puso en cada lado (guardamos el objeto del producto entero)
        let productoEnIzquierda = null;
        let productoEnDerecha = null;

        cargarNivel();

        function cargarNivel() {
            if (nivelActual >= niveles.length) {
                terminarJuego();
                return;
            }

            document.getElementById("titulo-nivel").innerText = `Nivel ${nivelActual + 1}`;
            document.getElementById("signo-fijo").innerText = niveles[nivelActual].signo;
            
            // Limpiar casillas y datos anteriores
            productoEnIzquierda = null;
            productoEnDerecha = null;
            
            const casIzq = document.getElementById("casilla-izquierda");
            const casDer = document.getElementById("casilla-derecha");
            casIzq.innerHTML = "Coloca aquí";
            casDer.innerHTML = "Coloca aquí";
            casIzq.style.backgroundColor = "#f5f5f5";
            casDer.style.backgroundColor = "#f5f5f5";

            // Mostrar botones correctos
            document.getElementById("btn-validar").style.display = "inline-block";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("btn-siguiente").style.display = "none";
            document.getElementById("btn-reiniciar-todo").style.display = "none";
            document.getElementById("mensaje").innerText = "";

            // Renderizar la vitrina de productos de este nivel
            const vitrina = document.getElementById("vitrina-productos");
            vitrina.innerHTML = "";
            vitrina.style.display = "flex";

            const prod1 = niveles[nivelActual].p1;
            const prod2 = niveles[nivelActual].p2;

            // Creamos las tarjetas visuales de forma dinámica
            vitrina.appendChild(crearTarjetaHTML(prod1));
            vitrina.appendChild(crearTarjetaHTML(prod2));
        }

        function crearTarjetaHTML(prod) {
            const div = document.createElement("div");
            div.className = "tarjeta-producto";
            div.id = prod.id;
            div.draggable = true;
            div.ondragstart = (e) => arrastrar(e, prod);
            div.onclick = () => leerTexto(`${prod.nombre}, cuesta ${prod.precio} pesos`);
            
            div.innerHTML = `
                <div class="icono">${prod.icono}</div>
                <div class="nombre">${prod.nombre}</div>
                <div class="precio">$${prod.precio}</div>
            `;
            return div;
        }

        // --- MANEJO DE DRAG & DROP (Arraste) ---
        let productoSiendoArrastrado = null;

        function arrastrar(ev, prod) {
            productoSiendoArrastrado = prod;
            ev.dataTransfer.setData("text", prod.id);
            leerTexto(`Llevando ${prod.nombre}`);
        }

        function permitirSoltar(ev) {
            ev.preventDefault();
        }

        function soltarProducto(ev, lado) {
            ev.preventDefault();
            const idData = ev.dataTransfer.getData("text");
            const elementoArrastrado = document.getElementById(idData);
            
            if (!elementoArrastrado) return;

            const casillaDestino = ev.currentTarget;
            casillaDestino.innerHTML = ""; // Limpiar texto de "Coloca aquí"
            casillaDestino.appendChild(elementoArrastrado);
            casillaDestino.style.backgroundColor = "#e8f5e9";

            if (lado === 'izq') {
                productoEnIzquierda = productoSiendoArrastrado;
            } else {
                productoEnDerecha = productoSiendoArrastrado;
            }

            leerTexto(`Pusiste ${productoSiendoArrastrado.nombre} en el lado ${lado === 'izq' ? 'izquierdo' : 'derecho'}`);
        }

        // --- VALIDACIÓN DE LA TIENDA ---
        function validarTienda() {
            if (!productoEnIzquierda || !productoEnDerecha) {
                leerTexto("Debes colocar un producto en cada casilla antes de validar.");
                return;
            }

            const signo = niveles[nivelActual].signo;
            const precioIzq = productoEnIzquierda.precio;
            const precioDer = productoEnDerecha.precio;
            
            let esCorrecto = false;
            if (signo === ">" && precioIzq > precioDer) esCorrecto = true;
            if (signo === "<" && precioIzq < precioDer) esCorrecto = true;

            const mensajeDiv = document.getElementById("mensaje");

            if (esCorrecto) {
                mensajeDiv.innerText = "¡Excelente! Está muy bien ordenado.";
                mensajeDiv.style.color = "green";
                leerTexto("¡Excelente! Está muy bien ordenado. Presiona siguiente nivel.");

                // Activamos botones de éxito
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-reintentar").style.display = "none";
                document.getElementById("btn-siguiente").style.display = "inline-block";
            } else {
                mensajeDiv.innerText = "¡Oh, algo está mal! El signo no corresponde.";
                mensajeDiv.style.color = "red";
                leerTexto("Está malo. Presiona el botón rojo para volver a empezar este nivel.");

                // Activamos botón de reintento
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-reintentar").style.display = "inline-block";
            }
        }

        function reintentarNivel() {
            cargarNivel(); // Recarga el mismo nivel reseteando todo
            leerTexto("Intentémoslo de nuevo.");
        }

        function siguienteNivel() {
            // El confeti explota JUSTO al presionar Siguiente Nivel como solicitaste
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });

            // Pequeña pausa para disfrutar el confeti antes de pasar al siguiente nivel
            setTimeout(() => {
                puntaje += 10;
                document.getElementById("puntos").innerText = puntaje;
                nivelActual++;
                cargarNivel();
            }, 600);
        }

        function terminarJuego() {
            document.getElementById("titulo-nivel").innerText = "¡Tienda Completada!";
            document.getElementById("mensaje").innerText = "¡Eres un experto comprador!";
            document.getElementById("mensaje").style.color = "blue";
            document.getElementById("vitrina-productos").style.display = "none";
            document.getElementById("signo-fijo").innerText = "🎉";
            
            document.getElementById("btn-validar").style.display = "none";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("btn-siguiente").style.display = "none";
            document.getElementById("btn-reiniciar-todo").style.display = "inline-block";

            leerTexto("¡Felicitaciones! Completaste todos los niveles de la tienda. Presiona el botón para jugar otra vez.");
        }

        function reiniciarJuegoCompleto() {
            nivelActual = 0;
            puntaje = 0;
            document.getElementById("puntos").innerText = puntaje;
            cargarNivel();
        }

        // --- FUNCIONES DE AUDIO ---
        function leerTexto(texto) {
            window.speechSynthesis.cancel();
            const lectura = new SpeechSynthesisUtterance(texto);
            lectura.lang = 'es-ES';
            window.speechSynthesis.speak(lectura);
        }

        function leerIndicaciones() {
            if (nivelActual >= niveles.length) {
                leerTexto("¡Has ganado! Presiona el botón morado para jugar otra vez.");
            } else {
                const signo = niveles[nivelActual].signo === ">" ? "mayor que" : "menor que";
                leerTexto(`Mira el signo del centro: es ${signo}. Arrastra un producto a la casilla izquierda y otro a la derecha para que la comparación matemática sea correcta. Al terminar, presiona Validar.`);
            }
        }
    </script>
</body>
</html>
