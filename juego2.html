<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Espacial: Combustible Solar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Arial Rounded MT Bold', Arial, sans-serif; background-color: #0b0f19; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #marcador { position: absolute; top: 20px; right: 20px; background-color: #0288d1; color: white; padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 15px rgba(2, 136, 209, 0.4); }
        
        /* Botón parlante y animación de pulso estelar */
        #btn-parlante { position: absolute; top: 20px; left: 20px; font-size: 40px; cursor: pointer; background: none; border: none; border-radius: 50%; padding: 5px; transition: transform 0.2s ease; }
        
        @keyframes pulso-espacial {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(0, 242, 254, 0)); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 15px #00f2fe); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(0, 242, 254, 0)); }
        }
        .parlante-llamativo { animation: pulso-espacial 1.2s infinite ease-in-out; }

        .pantalla-juego, .pantalla-final { text-align: center; background: #161c2a; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,242,254,0.2); width: 85%; max-width: 700px; border: 2px solid #00f2fe; }
        .pantalla-final { display: none; }
        h2 { color: #00f2fe; margin-top: 0; font-size: 28px; text-shadow: 0 0 10px rgba(0,242,254,0.5); }

        /* Panel de Reactores */
        .panel-reactores { display: flex; align-items: center; justify-content: center; gap: 25px; margin: 25px 0; background: #20283e; padding: 25px; border-radius: 20px; border: 3px solid #00f2fe; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        
        .reactor-izq { width: 160px; min-height: 160px; border: 4px solid #ff007f; border-radius: 15px; background-color: rgba(255, 0, 127, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; }
        .reactor-der { width: 160px; min-height: 160px; border: 4px solid #7000ff; border-radius: 15px; background-color: rgba(112, 0, 255, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; }
        
        .icono { font-size: 55px; margin-bottom: 5px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .nombre { font-size: 18px; font-weight: bold; color: #e0e6ed; }
        .energia { font-size: 28px; color: #00ff88; font-weight: bold; margin-top: 5px; text-shadow: 0 0 8px rgba(0,255,136,0.4); }

        /* Ranura del signo */
        .ranura-signo { width: 100px; height: 100px; background: #0d111a; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #00f2fe; font-size: 65px; font-weight: bold; border: 3px solid #00f2fe; box-shadow: 0 0 15px rgba(0,242,254,0.3); }

        /* Teclado Cuántico */
        .teclado-signos { display: flex; gap: 20px; justify-content: center; margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 2px dashed #00f2fe; }
        .btn-signo { width: 80px; height: 80px; font-size: 45px; font-weight: bold; color: white; background-color: #2c374e; border: 2px solid #00f2fe; border-radius: 15px; cursor: pointer; box-shadow: 0 6px #1a2333; transition: all 0.1s ease; }
        .btn-signo:active { box-shadow: 0 2px #1a2333; transform: translateY(4px); }
        .btn-signo.seleccionado { background-color: #00ff88; color: #0b0f19; box-shadow: 0 6px #00b35f; border-color: #ffffff; }

        /* Animación de pálpito de voz */
        @keyframes palpitar {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }
            100% { transform: scale(1); }
        }
        .efecto-hablar {
            animation: palpitar 0.8s ease-in-out 2;
            border-color: #ffffff !important;
        }

        .controles { display: flex; gap: 20px; justify-content: center; }
        button.btn-accion { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; }
        #btn-validar { background-color: #00f2fe; color: #0b0f19; box-shadow: 0 4px 10px rgba(0,242,254,0.4); }
        #btn-reintentar { background-color: #ff0055; }
        #btn-siguiente { background-color: #ff9f1c; }
        .btn-menu { background-color: #546e7a; }
        #mensaje { margin-top: 20px; font-size: 24px; font-weight: bold; min-height: 35px; }
        .resultado-puntos { font-size: 32px; color: #00ff88; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn-parlante" class="parlante-llamativo" onclick="leerIndicaciones()">🔊</button>
    <div id="marcador">⭐ Puntos: <span id="puntos">0</span></div>

    <div class="pantalla-juego" id="contenedor-juego">
        <h2 id="titulo-juego">Juego 4: Flujo de Hipervelocidad 🚀</h2>
        <p id="instrucciones-juego" style="font-weight: bold; color: #b0bec5; font-size: 18px;"></p>
        
        <div class="panel-reactores">
            <div class="reactor-izq" id="prod-izquierdo"></div>
            <div class="ranura-signo" id="pantalla-operador">?</div>
            <div class="reactor-der" id="prod-derecho"></div>
        </div>

        <div class="teclado-signos" id="bloque-teclado">
            <button class="btn-signo" onclick="seleccionarSigno('>')">&gt;</button>
            <button class="btn-signo" onclick="seleccionarSigno('=')">=</button>
            <button class="btn-signo" onclick="seleccionarSigno('<')">&lt;</button>
        </div>

        <div class="controles">
            <button class="btn-accion" id="btn-validar" onclick="validarJuego()">Estabilizar Flujo</button>
            <button class="btn-accion" id="btn-reintentar" onclick="reintentar()">Reiniciar Reactor</button>
            <button class="btn-accion" id="btn-siguiente" onclick="siguienteNivel()">Siguiente Reactor</button>
        </div>
        <div id="mensaje"></div>
    </div>

    <div class="pantalla-final" id="contenedor-final">
        <h2>🚀 ¡MISIÓN CUMPLIDA: VIAJE EXPEDITO! 🚀</h2>
        <p style="font-size: 22px; color: #e0e6ed;">¡Espectacular! Todos los reactores están calibrados. ¡Los motores de hipervelocidad se han encendido y regresamos a casa!</p>
        <div class="resultado-puntos">Sumaste +<span id="puntos-final">0</span> puntos interestelares</div>
        <p id="mensaje-final-evaluacion" style="font-size: 24px; font-weight: bold;"></p>
        
        <div class="controles" style="margin-top: 30px; flex-direction: column; gap: 15px;">
            <button class="btn-accion btn-menu" onclick="irAMenu()">🏠 Volver al menú de 4° Básico</button>
        </div>
    </div>

    <script>
        const niveles = [
            {
                titulo: "Reactor 1: Células de Plasma 🚀",
                instrucciones: "¡Misión espacial! Compara la potencia de las células de plasma y elige el signo correcto para equilibrar el flujo.",
                audioSecuencia: [
                    { texto: "Iniciando secuencia de despegue.", resaltar: "titulo-juego" },
                    { texto: "El reactor izquierdo tiene una potencia de 45 vatios.", resaltar: "prod-izquierdo" },
                    { texto: "El reactor derecho tiene 80 vatios.", resaltar: "prod-derecho" },
                    { texto: "Presiona el signo correcto en el teclado cuántico.", resaltar: "bloque-teclado" }
                ],
                izq: { nombre: "Plasma Alfa", potencia: 45, icono: "🧪" },
                der: { nombre: "Plasma Beta", potencia: 80, icono: "🧪" },
                respuestaCorrecta: "<",
                textoExito: "¡Reactor 1 Estable! 45 es MENOR QUE (<) 80.",
                textoFallo: "¡Alerta! Revisa bien los números. Cuarenta y cinco es menor que ochenta."
            },
            {
                titulo: "Reactor 2: Cristales de Uranio 🚀",
                instrucciones: "¡Segunda fase! Compara la carga energética de los cristales antes de que la nave salte al hiperespacio.",
                audioSecuencia: [
                    { texto: "Reactor dos listo para calibración.", resaltar: "titulo-juego" },
                    { texto: "A la izquierda hay un Cristal Azul con 350 vatios.", resaltar: "prod-izquierdo" },
                    { texto: "A la derecha hay un Cristal Verde con 120 vatios.", resaltar: "prod-derecho" },
                    { texto: "Elige el signo correcto en el panel.", resaltar: "bloque-teclado" }
                ],
                izq: { nombre: "Cristal Azul", potencia: 350, icono: "💎" },
                der: { nombre: "Cristal Verde", potencia: 120, icono: "💚" },
                respuestaCorrecta: ">",
                textoExito: "¡Reactor 2 Estable! 350 es MAYOR QUE (>) 120.",
                textoFallo: "¡Error de órbita! Trescientos cincuenta tiene más energía que ciento veinte."
            },
            {
                titulo: "Reactor 3: Núcleos de Antimateria 🚀",
                instrucciones: "¡Fase final de la misión! Sincroniza la potencia de los dos núcleos principales de la nave.",
                audioSecuencia: [
                    { texto: "Último paso para encender los motores.", resaltar: "titulo-juego" },
                    { texto: "El núcleo izquierdo marca exactamente 240 unidades.", resaltar: "prod-izquierdo" },
                    { texto: "El núcleo derecho marca exactamente 240 unidades.", resaltar: "prod-derecho" },
                    { texto: "Descubre el signo correspondiente para activar la hipervelocidad.", resaltar: "bloque-teclado" }
                ],
                izq: { nombre: "Núcleo Izquierdo", potencia: 240, icono: "⚛️" },
                der: { nombre: "Núcleo Derecho", potencia: 240, icono: "⚛️" },
                respuestaCorrecta: "=",
                textoExito: "¡Sincronización perfecta! Ambas energías son IGUALES (=).",
                textoFallo: "¡Atención astronauta! Ambos reactores tienen el mismo número, usa el signo igual."
            }
        ];

        let nivelActual = 0;
        let puntosGanadosEsteJuego = 0;
        let signoSeleccionado = null;

        function obtenerPuntajeGlobal() {
            return parseInt(localStorage.getItem("puntajeAcumulado")) || 0;
        }

        function actualizarMarcadorVisual() {
            document.getElementById("puntos").innerText = obtenerPuntajeGlobal();
        }

        function cargarNivel(numNivel) {
            if (numNivel >= niveles.length) {
                mostrarPantallaFinal();
                return;
            }

            const datosNivel = niveles[numNivel];
            signoSeleccionado = null;

            document.getElementById("titulo-juego").innerText = datosNivel.titulo;
            document.getElementById("instrucciones-juego").innerText = datosNivel.instrucciones;
            document.getElementById("pantalla-operador").innerText = "?";
            document.getElementById("mensaje").innerText = "";

            // Reactiva el pálpito llamativo del parlante para el inicio del nuevo nivel
            document.getElementById("btn-parlante").classList.add("parlante-llamativo");

            document.getElementById("btn-validar").style.display = "inline-block";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("btn-siguiente").style.display = "none";

            const botones = document.querySelectorAll(".btn-signo");
            botones.forEach(b => b.classList.remove("seleccionado"));

            const divIzq = document.getElementById("prod-izquierdo");
            const divDer = document.getElementById("prod-derecho");

            divIzq.innerHTML = `<div class="icono">${datosNivel.izq.icono}</div><div class="nombre">${datosNivel.izq.nombre}</div><div class="energia">${datosNivel.izq.potencia} W</div>`;
            divDer.innerHTML = `<div class="icono">${datosNivel.der.icono}</div><div class="nombre">${datosNivel.der.nombre}</div><div class="energia">${datosNivel.der.potencia} W</div>`;

            actualizarMarcadorVisual();
        }

        function seleccionarSigno(signo) {
            signoSeleccionado = signo;
            document.getElementById("pantalla-operador").innerText = signo;
            let textoSigno = signo === '>' ? 'mayor que' : signo === '<' ? 'menor que' : 'igual a';
            let u = new SpeechSynthesisUtterance(`Signo ${textoSigno} seleccionado`);
            u.lang = 'es-ES';
            window.speechSynthesis.speak(u);

            const botones = document.querySelectorAll(".btn-signo");
            botones.forEach(b => {
                if (b.innerText === signo) {
                    b.classList.add("seleccionado");
                } else {
                    b.classList.remove("seleccionado");
                }
            });
        }

        function validarJuego() {
            if (!signoSeleccionado) {
                leerTextoSimple("Por favor, selecciona un operador cuántico antes de activar el flujo.");
                return;
            }

            const datosNivel = niveles[nivelActual];

            if (signoSeleccionado === datosNivel.respuestaCorrecta) {
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                
                document.getElementById("mensaje").innerText = datosNivel.textoExito;
                document.getElementById("mensaje").style.color = "#00ff88";
                leerTextoSimple("¡Flujo estabilizado con éxito! Excelente.");

                puntosGanadosEsteJuego += 10;
                let nuevoTotal = obtenerPuntajeGlobal() + 10;
                localStorage.setItem("puntajeAcumulado", nuevoTotal);
                actualizarMarcadorVisual();

                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-siguiente").style.display = "inline-block";
            } else {
                document.getElementById("mensaje").innerText = datosNivel.textoFallo;
                document.getElementById("mensaje").style.color = "#ff0055";
                leerTextoSimple("Error en el flujo. El reactor está inestable.");

                const pantallaOp = document.getElementById("pantalla-operador");
                pantallaOp.style.transform = "scale(1.2)";
                setTimeout(() => pantallaOp.style.transform = "scale(1)", 200);

                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-reintentar").style.display = "inline-block";
            }
        }

        function reintentar() {
            document.getElementById("btn-validar").style.display = "inline-block";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("mensaje").innerText = "";
            cargarNivel(nivelActual);
        }

        function siguienteNivel() {
            window.speechSynthesis.cancel();
            nivelActual++;
            cargarNivel(nivelActual);
        }

        function mostrarPantallaFinal() {
            document.getElementById("contenedor-juego").style.display = "none";
            document.getElementById("contenedor-final").style.display = "block";
            document.getElementById("puntos-final").innerText = puntosGanadosEsteJuego;
            document.getElementById("btn-parlante").classList.remove("parlante-llamativo");

            const txtEvaluacion = document.getElementById("mensaje-final-evaluacion");
            txtEvaluacion.innerText = "🏆 ¡Misión completada! Puntos guardados en la base interestelar.";
            txtEvaluacion.style.color = "#00ff88";

            leerTextoSimple("¡Felicidades comandante! Completaste la misión. Presiona el botón para regresar.");
        }

        function leerSecuencia(secuencia, indice = 0) {
            if (indice >= secuencia.length) return;

            const paso = secuencia[indice];
            const elementoHTML = document.getElementById(paso.resaltar);

            const u = new SpeechSynthesisUtterance(paso.texto);
            u.lang = 'es-ES';

            u.onstart = () => {
                if (elementoHTML) elementoHTML.classList.add("efecto-hablar");
            };

            u.onend = () => {
                if (elementoHTML) elementoHTML.classList.remove("efecto-hablar");
                leerSecuencia(secuencia, indice + 1);
            };

            window.speechSynthesis.speak(u);
        }

        function leerTextoSimple(t) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'es-ES'; 
            window.speechSynthesis.speak(u); 
        }

        function leerIndicaciones() { 
            // Apaga el pálpito inicial en cuanto el usuario presiona el parlante
            document.getElementById("btn-parlante").classList.remove("parlante-llamativo");

            window.speechSynthesis.cancel();
            document.getElementById("prod-izquierdo").classList.remove("efecto-hablar");
            document.getElementById("prod-derecho").classList.remove("efecto-hablar");
            document.getElementById("bloque-teclado").classList.remove("efecto-hablar");

            if(document.getElementById("contenedor-juego").style.display !== "none") {
                leerSecuencia(niveles[nivelActual].audioSecuencia); 
            } else {
                leerTextoSimple("Misión terminada. Presiona el botón de la pantalla.");
            }
        }

        function irAMenu() {
            window.speechSynthesis.cancel();
            window.location.href = "4basico.html";
        }

        window.onload = () => {
            cargarNivel(0);
        };
    </script>
</body>
</html>
