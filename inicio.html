<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIENVENIDO</title>
    <link rel="stylesheet" href="CSS/inicio.CSS">
</head>
<body>
    <div class="contenedor-principal">

        <!-- Logo dentro de su propio rectángulo + forma circular -->
        <div class="rectangulo-logo">
            <img src="img/logo.avif" alt="Logo Plataforma" class="logo">
        </div>

        <!-- Título principal -->
        <h1>¡BIENVENIDO!</h1>

        <!-- Rectángulo con los datos -->
        <div class="recuadro-info">
            <h3>Tus datos registrados</h3>
            <img id="avatarUsuario" alt="Avatar seleccionado">
            <p>Nombre: <span id="nombreUsuario"></span></p>
        </div>

        <!-- Botón de acción -->
        <button onclick="alert('¡Excelente! Continuemos con las actividades')">Seguir</button>

    </div>
<script src="js/inicio.js"></script>

</body>
</html>
