<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendiendo a Contar del 1 al 5!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Arial Round', 'Comic Sans MS', sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #0288d1;
            font-size: 2.5rem;
            text-shadow: 2px 2px #fff;
            margin-bottom: 10px;
        }

        /* Botón de Parlante */
        .btn-parlante {
            background-color: #ffeb3b;
            border: 4px solid #fbc02d;
            border-radius: 50%;
            font-size: 2.5rem;
            cursor: pointer;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px #fbc02d;
            transition: all 0.1s;
            margin-bottom: 30px;
        }

        .btn-parlante:active {
            box-shadow: 0 2px #fbc02d;
            transform: translateY(3px);
        }

        /* Contenedor de la secuencia */
        .secuencia-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .casilla {
            width: 80px;
            height: 80px;
            background-color: #fff;
            border: 4px dashed #b0bec5;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #37474f;
        }

        .casilla.fijo {
            background-color: #81c784;
            border-style: solid;
            border-color: #4caf50;
            color: white;
        }

        /* Contenedor de números para arrastrar */
        .opciones-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 90px;
        }

        .numero-arrastrable {
            width: 80px;
            height: 80px;
            background-color: #ff7043;
            border: 4px solid #f4511e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            cursor: grab;
            box-shadow: 0 5px #f4511e;
        }

        .numero-arrastrable:active {
            cursor: grabbing;
        }

        /* Botón de validar */
        .btn-validar {
            padding: 15px 40px;
            font-size: 1.8rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px #388e3c;
            font-weight: bold;
        }

        .btn-validar:active {
            box-shadow: 0 2px #388e3c;
            transform: translateY(4px);
        }

        /* Mensaje de resultado */
        #mensaje {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
        }
        
        .correcto { color: #2e7d32; }
        .incorrecto { color: #c62828; }
    </style>
</head>
<body>

    <h1>¡Completa la secuencia!</h1>
    
    <button class="btn-parlante" onclick="reproducirInstrucciones()" title="Escuchar instrucciones">🔊</button>

    <div class="secuencia-container">
        <div class="casilla fijo">1</div>
        <div class="casilla destino" data-numero="2" id="target-2"></div>
        <div class="casilla fijo">3</div>
        <div class="casilla destino" data-numero="4" id="target-4"></div>
        <div class="casilla destino" data-numero="5" id="target-5"></div>
    </div>

    <div class="opciones-container" id="contenedor-opciones">
        <div class="numero-arrastrable" draggable="true" id="drag-4" data-val="4">4</div>
        <div class="numero-arrastrable" draggable="true" id="drag-2" data-val="2">2</div>
        <div class="numero-arrastrable" draggable="true" id="drag-5" data-val="5">5</div>
    </div>

    <button class="btn-validar" onclick="validarActividad()">¿Terminé?</button>
    
    <div id="mensaje"></div>

    <script>
        // Función para que el juego hable en español
        function hablar(texto) {
            window.speechSynthesis.cancel();
            
            const mensajeVoz = new SpeechSynthesisUtterance(texto);
            mensajeVoz.lang = 'es-ES'; 
            mensajeVoz.rate = 0.9;     
            window.speechSynthesis.speak(mensajeVoz);
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                hablar("¡Empecemos la actividad!");
            }, 500);
        });

        function reproducirInstrucciones() {
            hablar("Debes deslizar los números a su casilla correspondiente.");
        }

        // Lógica de Arrastrar y Soltar (Drag and Drop)
        const arrastrables = document.querySelectorAll('.numero-arrastrable');
        const destinos = document.querySelectorAll('.destino');

        arrastrables.forEach(elemento => {
            elemento.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
                hablar(e.target.dataset.val); 
            });

            elemento.addEventListener('click', (e) => {
                hablar(e.target.dataset.val);
            });
        });

        destinos.forEach(destino => {
            destino.addEventListener('dragover', (e) => {
                e.preventDefault(); 
            });

            destino.addEventListener('drop', (e) => {
                e.preventDefault();
                const idElemento = e.dataTransfer.getData('text');
                const elementoArrastrado = document.getElementById(idElemento);
                
                if (destino.children.length === 0) {
                    destino.appendChild(elementoArrastrado);
                    hablar(elementoArrastrado.dataset.val);
                }
            });
        });

        const contenedorOpciones = document.getElementById('contenedor-opciones');
        contenedorOpciones.addEventListener('dragover', (e) => e.preventDefault());
        contenedorOpciones.addEventListener('drop', (e) => {
            e.preventDefault();
            const idElemento = e.dataTransfer.getData('text');
            const elementoArrastrado = document.getElementById(idElemento);
            contenedorOpciones.appendChild(elementoArrastrado);
        });

        // Validación final de la actividad
        function validarActividad() {
            let aciertos = 0;
            const casillasDestino = ['target-2', 'target-4', 'target-5'];
            const divMensaje = document.getElementById('mensaje');

            casillasDestino.forEach(id => {
                const casilla = document.getElementById(id);
                const numeroCorrecto = casilla.dataset.numero;
                
                if (casilla.firstElementChild && casilla.firstElementChild.dataset.val === numeroCorrecto) {
                    aciertos++;
                }
            });

            // Si los 3 números que faltaban están bien puestos
            if (aciertos === 3) {
                divMensaje.className = "correcto";
                divMensaje.innerText = "¡Excelente! Lo hiciste increíble. 🎉";
                hablar("¡Excelente! Lo hiciste increíble.");

                // Ahora que la librería está en el HEAD, esto funcionará:
                if (typeof confetti === "function") {
                    confetti({
                        particleCount: 180, 
                        spread: 80,         
                        origin: { y: 0.6 }  
                    });
                }
            } else {
                divMensaje.className = "incorrecto";
                divMensaje.innerText = "¡Oh, casi! Revisa bien los números e inténtalo de nuevo. 💪";
                hablar("¡Oh, casi! Revisa bien los números e inténtalo de nuevo.");
            }
        }
    </script>
</body>
</html>
