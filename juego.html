<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 1: La Cafetería</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Arial Rounded MT Bold', Arial, sans-serif; background-color: #ffe0b2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #marcador { position: absolute; top: 20px; right: 20px; background-color: #ff9800; color: white; padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: bold; }
        #btn-parlante { position: absolute; top: 20px; left: 20px; font-size: 40px; cursor: pointer; background: none; border: none; }
        .pantalla-juego { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 85%; max-width: 700px; }
        h2 { color: #e65100; margin-top: 0; }
        .fuente-donas { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; background: #fff3e0; padding: 15px; border-radius: 15px; border: 2px dashed #ffb74d; min-height: 80px; }
        .dona { font-size: 45px; cursor: grab; user-select: none; }
        .zona-comparacion { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .caja-destino { width: 180px; height: 180px; border: 4px dashed #b2dfdb; border-radius: 15px; background-color: #e0f2f1; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 5px; padding: 10px; justify-content: center; overflow: hidden; }
        .plato-fijo { width: 180px; height: 180px; border: 4px solid #ffb74d; border-radius: 15px; background-color: #fff8e1; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 5px; padding: 10px; justify-content: center; }
        .signo { font-size: 70px; font-weight: bold; color: #e65100; }
        .controles { display: flex; gap: 20px; justify-content: center; }
        button.btn-accion { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; }
        #btn-validar { background-color: #4caf50; }
        #btn-reintentar { background-color: #f44336; display: none; }
        #btn-siguiente { background-color: #2196f3; display: none; }
        #mensaje { margin-top: 20px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn-parlante" onclick="leerIndicaciones()">🔊</button>
    <div id="marcador">⭐ Puntos: <span id="puntos">0</span></div>

    <div class="pantalla-juego">
        <h2>Juego 1: ¡El Reto de las Donas! 🍩</h2>
        <p style="font-weight: bold; color: #555;">En el plato amarillo hay 2 donas. Arrastra desde la bandeja de arriba las donas necesarias a la caja verde para que la cantidad sea **MAYOR** que 2.</p>
        
        <div class="fuente-donas" id="bandeja" ondragover="permitirSoltar(event)" ondrop="soltarDeVuelta(event)">
            <div class="dona" id="d1" draggable="true" ondragstart="start(event)">🍩</div>
            <div class="dona" id="d2" draggable="true" ondragstart="start(event)">🍩</div>
            <div class="dona" id="d3" draggable="true" ondragstart="start(event)">🍩</div>
            <div class="dona" id="d4" draggable="true" ondragstart="start(event)">🍩</div>
            <div class="dona" id="d5" draggable="true" ondragstart="start(event)">🍩</div>
        </div>

        <div class="zona-comparacion">
            <div class="caja-destino" id="caja-izquierda" ondragover="permitirSoltar(event)" ondrop="soltarEnCaja(event)"></div>
            
            <div class="signo">&gt;</div>
            
            <div class="plato-fijo">
                <div class="dona">🍩</div>
                <div class="dona">🍩</div>
            </div>
        </div>

        <div class="controles">
            <button class="btn-accion" id="btn-validar" onclick="validarJuego()">Verificar</button>
            <button class="btn-accion" id="btn-reintentar" onclick="reintentar()">Volver a intentar</button>
            <button class="btn-accion" id="btn-siguiente" onclick="siguiente()">Siguiente Juego</button>
        </div>
        <div id="mensaje"></div>
    </div>

    <script>
        // CAMBIO AQUÍ: Como borraste la pantalla anterior, obligamos a que el juego arranque en 0 puntos siempre.
        let puntaje = 0;
        localStorage.setItem("puntajeAcumulado", puntaje);
        document.getElementById("puntos").innerText = puntaje;

        function start(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function permitirSoltar(ev) { ev.preventDefault(); }
        
        function soltarEnCaja(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            document.getElementById("caja-izquierda").appendChild(document.getElementById(data));
            leerTexto("Pusiste una dona en la caja");
        }

        function soltarDeVuelta(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            document.getElementById("bandeja").appendChild(document.getElementById(data));
        }

        function validarJuego() {
            const donasEnCaja = document.getElementById("caja-izquierda").children.length;
            
            if (donasEnCaja > 2) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                document.getElementById("mensaje").innerText = "¡Excelente! Pusiste " + donasEnCaja + " donas. ¡Es mayor que 2!";
                document.getElementById("mensaje").style.color = "green";
                leerTexto("¡Muy bien hecho! Es correcto. Presiona el botón para ir al siguiente juego.");
                
                // MEJORA AQUÍ: Sumamos y mostramos los puntos inmediatamente en pantalla como recompensa visual
                puntaje += 10;
                localStorage.setItem("puntajeAcumulado", puntaje);
                document.getElementById("puntos").innerText = puntaje;

                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-siguiente").style.display = "inline-block";
            } else {
                document.getElementById("mensaje").innerText = "¡Uh oh! Inténtalo de nuevo.";
                document.getElementById("mensaje").style.color = "red";
                leerTexto("Eso no está correcto. Recuerda que la caja verde debe tener más donas que el plato amarillo. Vuelve a intentarlo.");
                document.getElementById("btn-validar").style.display = "none";
                document.getElementById("btn-reintentar").style.display = "inline-block";
            }
        }

        function reintentar() {
            const caja = document.getElementById("caja-izquierda");
            const bandeja = document.getElementById("bandeja");
            while(caja.children.length > 0){
                bandeja.appendChild(caja.children[0]);
            }
            document.getElementById("btn-validar").style.display = "inline-block";
            document.getElementById("btn-reintentar").style.display = "none";
            document.getElementById("mensaje").innerText = "";
        }

        function siguiente() {
            window.speechSynthesis.cancel();
            // Ya no sumamos los puntos aquí porque los sumamos arriba al ganar
            window.location.href = "juego2.html";
        }

        function leerTexto(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='es-ES'; window.speechSynthesis.speak(u); }
        function leerIndicaciones() { leerTexto("Arrastra las donas a la caja verde para que tengas una cantidad mayor que las dos donas del plato amarillo."); }
    </script>
</body>
</html>
