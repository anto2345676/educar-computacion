<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de 4° Básico - Matemáticas</title>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background: linear-gradient(to bottom, #e3f2fd, #ffffff);
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }

        .contenedor-panel {
            background: white;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #90caf9;
        }

        h1 { color: #1565c0; margin-bottom: 5px; }
        p { font-size: 18px; color: #555; }

        .marcador-global {
            background-color: #fff9c4;
            border: 2px dashed #fbc02d;
            border-radius: 15px;
            padding: 20px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-size: 32px;
            font-weight: bold;
            color: #f57f17;
            margin: 20px 0;
        }

        .bloque-acciones {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        .btn-ir { background-color: #4caf50; }
        .btn-reiniciar { background-color: #e53935; }
    </style>
</head>
<body>

    <div class="contenedor-panel">
        <h1>🏫 Aula Virtual: 4° Año Básico</h1>
        <p>Progreso global de desafíos de comparación matemática</p>

        <div class="marcador-global">
            ⭐ <span id="total-puntos">0</span> Puntos Totales
        </div>

        <div class="bloque-acciones">
            <button class="btn btn-ir" onclick="irALaTienda()">🛒 Entrar a la Tienda</button>
            <button class="btn btn-reiniciar" onclick="reiniciarTodo()">🔄 Limpiar Puntaje</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            actualizarMarcador();
            
            let puntos = localStorage.getItem("puntajeAcumulado") || 0;
            let saludo = new SpeechSynthesisUtterance(`Tu puntaje acumulado actual es de ${puntos} puntos.`);
            saludo.lang = 'es-ES';
            window.speechSynthesis.speak(saludo);
        };

        function actualizarMarcador() {
            let puntajeTotal = localStorage.getItem("puntajeAcumulado") || 0;
            document.getElementById("total-puntos").innerText = puntajeTotal;
        }

        function irALaTienda() {
            window.location.href = "index.html"; 
        }

        function reiniciarTodo() {
            if (confirm("¿Seguro que quieres reiniciar el puntaje de todos los juegos a 0?")) {
                localStorage.setItem("puntajeAcumulado", 0);
                actualizarMarcador();
                
                let msg = new SpeechSynthesisUtterance("Puntaje reiniciado con éxito.");
                msg.lang = 'es-ES';
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
