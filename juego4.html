<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervivencia: La Balsa en Llamas</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif; 
            background: linear-gradient(180deg, #111 0%, #d93d1a 100%); 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        #marcador { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background-color: #ffb703; 
            color: #023047; 
            padding: 12px 24px; 
            border-radius: 20px; 
            font-size: 22px; 
            font-weight: bold; 
            box-shadow: 0 6px 0 #fb8500;
            border: 3px solid #023047;
        }

        @keyframes parpadeoFuerte {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #fff); background-color: transparent; }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 25px #ffb703); background-color: rgba(255,183,3,0.4); border-radius: 50%; }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #fff); background-color: transparent; }
        }

        #btn-parlante { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            font-size: 45px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            padding: 5px;
            transition: all 0.3s;
        }

        .parlante-alerta {
            animation: parpadeoFuerte 0.8s ease-in-out infinite;
        }
        
        .contenedor-isla { 
            text-align: center; 
            background: #2b2d42; 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            width: 90%; 
            max-width: 700px; 
            border: 5px solid #ef233c;
        }

        .pantalla-final { display: none; }
        
        h2 { color: #ffb703; margin-top: 0; font-size: 26px; }

        #pantalla-animacion {
            background: linear-gradient(180deg, #2a9d8f 0%, #e76f51 100%);
            border-radius: 20px;
            border: 4px solid #3d2612;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        .zona-operacion {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .numero-isla {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            background: #8d99ae;
            padding: 10px 20px;
            border-radius: 10px;
            border-bottom: 4px solid #4a4e69;
        }

        .incognita-signo {
            font-size: 40px;
            font-weight: bold;
            color: #ef233c;
            width: 70px;
            height: 70px;
            background: #edf2f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #ef233c;
        }

        .teclado-signos { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            margin-bottom: 10px; 
        }
        
        .btn-signo { 
            width: 80px; 
            height: 80px; 
            font-size: 45px; 
            font-weight: bold; 
            color: #fff; 
            background-color: #634832; 
            border: 3px solid #3d2612; 
            border-radius: 15px; 
            cursor: pointer; 
            box-shadow: 0 6px 0 #3d2612; 
            transition: all 0.1s ease; 
        }
        .btn-signo:active { 
            box-shadow: 0 2px #3d2612; 
            transform: translateY(4px); 
        }

        .controles-finales {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-accion-final {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-reintentar-juego { background-color: #f4a261; box-shadow: 0 4px 0 #b15b00; }
        .btn-menu { background-color: #457b9d; box-shadow: 0 4px 0 #2a4d6c; }
        
        #mensaje { margin-top: 15px; font-size: 22px; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

    <button id="btn-parlante" class="parlante-alerta" onclick="leerIndicaciones()">🔊</button>
    <div id="marcador">⭐ Puntos: <span id="puntos">0</span></div>

    <div class="contenedor-isla" id="contenedor-juego">
        <h2 id="titulo-juego">¡Salva al Monito de las Llamas! 🔥🐒</h2>
        
        <canvas id="pantalla-animacion" width="600" height="200"></canvas>
        
        <div class="zona-operacion">
            <div class="numero-isla" id="num-izq">0</div>
            <div class="incognita-signo" id="pantalla-operador">?</div>
            <div class="numero-isla" id="num-der">0</div>
        </div>
        
        <div class="teclado-signos" id="bloque-teclado">
            <button class="btn-signo" onclick="jugarSigno('>')">&gt;</button>
            <button class="btn-signo" onclick="jugarSigno('=')">=</button>
            <button class="btn-signo" onclick="jugarSigno('<')">&lt;</button>
        </div>
        <div id="mensaje"></div>
    </div>

    <div class="contenedor-isla pantalla-final" id="contenedor-final">
        <h2 id="resultado-titulo-final">🏆 ¡JUEGO TERMINADO! 🏆</h2>
        <p id="resultado-texto-final" style="font-size: 20px;"></p>
        <div style="font-size: 30px; color: #ffb703; margin: 20px 0; font-weight: bold;">Sumaste +<span id="puntos-final">0</span> puntos de rescate</div>
        
        <div class="controles-finales">
            <!-- Ambos botones se quedan fijos uno al lado del otro (o arriba y abajo) para el niño -->
            <button class="btn-accion-final btn-reintentar-juego" onclick="reiniciarJuegoCompleto()">🔄 Volver a Intentar Juego</button>
            <button class="btn-accion-final btn-menu" onclick="irAMenu()">🏠 Volver al menú de 4° Básico</button>
        </div>
    </div>

    <script>
        const niveles = [
            { izq: 75, der: 25, correcto: ">", exito: "¡Correcto! 75 es mayor que 25.", fallo: "¡Error! La balsa se quema." },
            { izq: 90, der: 90, correcto: "=", exito: "¡Muy bien! Ambos son iguales.", fallo: "¡Cuidado! El fuego se extiende." },
            { izq: 120, der: 180, correcto: "<", exito: "¡Excelente! 120 es menor que 180.", fallo: "¡Alerta! Tramo dañado por el fuego." },
            { izq: 340, der: 210, correcto: ">", exito: "¡Genial! 340 es mayor que 210.", fallo: "¡Balsa destruida!" }
        ];

        let nivelActual = 0;
        let errores = 0; 
        let puntosGanadosEsteJuego = 0;
        
        const canvas = document.getElementById("pantalla-animacion");
        const ctx = canvas.getContext("2d");
        let anguloMovimiento = 0;
        let particulasFuego = [];

        function obtenerPuntajeGlobal() {
            return parseInt(localStorage.getItem("puntajeAcumulado")) || 0;
        }

        function actualizarMarcadorVisual() {
            document.getElementById("puntos").innerText = obtenerPuntajeGlobal();
        }

        function cargarNivel(numNivel) {
            if (numNivel >= niveles.length) {
                terminarJuego(errores < 4);
                return;
            }

            const datos = niveles[numNivel];
            document.getElementById("num-izq").innerText = datos.izq;
            document.getElementById("num-der").innerText = datos.der;
            document.getElementById("pantalla-operador").innerText = "?";
            document.getElementById("mensaje").innerText = "";
            activarBotones(true);
            actualizarMarcadorVisual();
        }

        function activarBotones(activar) {
            const botones = document.querySelectorAll(".btn-signo");
            botones.forEach(b => b.disabled = !activar);
        }

        function jugarSigno(signo) {
            const datos = niveles[nivelActual];
            document.getElementById("pantalla-operador").innerText = signo;
            activarBotones(false);

            if (signo === datos.correcto) {
                confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 } });
                document.getElementById("mensaje").innerText = datos.exito;
                document.getElementById("mensaje").style.color = "#4c9a2a";
                puntosGanadosEsteJuego += 10;
                localStorage.setItem("puntajeAcumulado", obtenerPuntajeGlobal() + 10);
                actualizarMarcadorVisual();
                leerTextoSimple("¡Excelente!");

                setTimeout(() => {
                    nivelActual++;
                    cargarNivel(nivelActual);
                }, 2000);

            } else {
                errores++;
                document.getElementById("mensaje").innerText = datos.fallo;
                document.getElementById("mensaje").style.color = "#ef233c";
                leerTextoSimple("Respuesta incorrecta. El fuego sigue encendido.");
                
                generarFuegoFijo(220 + ((errores - 1) * 40) + 15, 130);

                setTimeout(() => {
                    if (errores >= 4) {
                        terminarJuego(false);
                    } else {
                        nivelActual++;
                        cargarNivel(nivelActual);
                    }
                }, 2500);
            }
        }

        function generarFuegoFijo(x, y) {
            particulasFuego.push({ x: x, y: y });
        }

        function reiniciarJuegoCompleto() {
            nivelActual = 0;
            errores = 0;
            puntosGanadosEsteJuego = 0;
            particulasFuego = []; 
            
            document.getElementById("contenedor-final").style.display = "none";
            document.getElementById("contenedor-juego").style.display = "block";
            document.getElementById("btn-parlante").classList.add("parlante-alerta"); 
            
            cargarNivel(0);
        }

        function terminarJuego(ganado) {
            document.getElementById("contenedor-juego").style.display = "none";
            document.getElementById("contenedor-final").style.display = "block";
            document.getElementById("puntos-final").innerText = puntosGanadosEsteJuego;

            const titulo = document.getElementById("resultado-titulo-final");
            const texto = document.getElementById("resultado-texto-final");

            if (ganado && errores < 4) {
                titulo.innerText = "🐒 ¡MONITO SALVADO! 🐒";
                texto.innerText = "¡Increíble! Lograste responder los desafíos y la balsa resistió lo suficiente para llegar a la costa sin hundirse.";
                leerTextoSimple("¡Felicidades! Salvaste al monito. Elige si quieres jugar otra vez o salir.");
            } else {
                titulo.innerText = "🔥 LA BALSA SE HUNDIÓ 🔥";
                texto.innerText = "¡Oh no! Demasiados incendios rompieron los soportes de madera y el monito cayó al agua. ¡Elige si quieres intentarlo de nuevo!";
                leerTextoSimple("La balsa se quemó por completo. Puedes volver a intentarlo o volver al menú.");
            }
        }

        /* --- MOTOR DE ANIMACIÓN --- */
        function animar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#e63946";
            ctx.fillRect(0, 160, canvas.width, 40);

            anguloMovimiento += 0.04;
            let balanceoY = errores >= 4 ? 50 : Math.sin(anguloMovimiento) * 5; 
            let baseOffsetX = 220;
            let baseOffsetY = 110 + balanceoY;

            ctx.fillStyle = "#634832"; 
            if (errores < 1) ctx.fillRect(baseOffsetX, baseOffsetY + 30, 35, 15);
            if (errores < 2) ctx.fillRect(baseOffsetX + 40, baseOffsetY + 30, 35, 15);
            if (errores < 3) ctx.fillRect(baseOffsetX + 80, baseOffsetY + 30, 35, 15);
            if (errores < 4) ctx.fillRect(baseOffsetX + 120, baseOffsetY + 30, 35, 15);

            particulasFuego.forEach(fuego => {
                ctx.fillStyle = Math.random() > 0.5 ? "#ff5722" : "#ffb703";
                ctx.font = "22px Arial";
                ctx.fillText("🔥", fuego.x, fuego.y + balanceoY);
            });

            let monoY = errores >= 4 ? 145 : baseOffsetY;
            let monoX = baseOffsetX + 60;

            ctx.fillStyle = "#9c6644";
            ctx.beginPath(); ctx.arc(monoX + 20, monoY, 18, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(monoX + 1, monoY, 6, 0, Math.PI * 2); ctx.arc(monoX + 39, monoY, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#e6ccb2";
            ctx.beginPath(); ctx.arc(monoX + 20, monoY + 2, 12, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#000";
            if (errores >= 3) {
                ctx.font = "bold 12px Arial";
                ctx.fillText("X", monoX + 10, monoY + 3); ctx.fillText("X", monoX + 22, monoY + 3);
            } else {
                ctx.beginPath(); ctx.arc(monoX + 15, monoY, 2, 0, Math.PI * 2); ctx.arc(monoX + 25, monoY, 2, 0, Math.PI * 2); ctx.fill();
            }

            ctx.fillStyle = "#9c6644";
            ctx.fillRect(monoX + 5, monoY + 18, 30, 20);

            requestAnimationFrame(animar);
        }

        function leerTextoSimple(t) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'es-ES'; 
            window.speechSynthesis.speak(u); 
        }

        function leerIndicaciones() { 
            document.getElementById("btn-parlante").classList.remove("parlante-alerta");
            const datos = niveles[nivelActual];
            leerTextoSimple(`¡Ayuda al monito! Compara los números de la balsa. A la izquierda tienes ${datos.izq} y a la derecha tienes ${datos.der}. Selecciona el signo correcto.`);
        }

        function irAMenu() {
            window.speechSynthesis.cancel();
            window.location.href = "4basico.html";
        }

        window.onload = () => {
            cargarNivel(0);
            animar();
        };
    </script>
</body>
</html>
