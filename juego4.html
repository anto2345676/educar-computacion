<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Mayor y Menor</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Marcador de puntaje en la esquina superior derecha */
        #marcador {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ffcc00;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Botón del parlante de indicaciones */
        #btn-parlante {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.2s;
        }
        #btn-parlante:hover { transform: scale(1.1); }

        /* Contenedor del juego */
        .pantalla-juego {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            min-width: 450px;
        }

        /* Zona de la ecuación */
        .zona-comparacion {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .numero {
            font-size: 64px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            padding: 10px;
        }

        /* Casilla donde se suelta el signo */
        .casilla-destino {
            width: 100px;
            height: 100px;
            border: 4px dashed #bbb;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            background-color: #fafafa;
        }

        /* Zona de los signos arrastrables */
        .zona-signos {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .signo {
            font-size: 64px;
            font-weight: bold;
            width: 90px;
            height: 90px;
            background-color: #4da6ff;
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
            box-shadow: 0 6px rgba(0, 74, 153, 1);
        }
        .signo:active { cursor: grabbing; }

        /* Botones de control */
        .controles {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button.btn-accion {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px rgba(0,0,0,0.2);
        }
        
        #btn-siguiente { background-color: #ff9f1c; }
        #btn-validar-final { background-color: #2ec4b6; display: none; }
        #btn-reiniciar-todo { background-color: #7209b7; display: none; }
        
        button.btn-accion:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Mensajes de feedback */
        #mensaje {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btn-parlante" onclick="leerIndicaciones()" title="Escuchar indicaciones">🔊</button>

    <div id="marcador">Puntos: <span id="puntos">0</span></div>

    <div class="pantalla-juego">
        <h2 id="titulo-pantalla" style="color: #4da6ff; margin-top: 0;">¡A jugar!</h2>

        <div class="zona-comparacion" id="area-comparacion">
            <div class="numero" id="num1" onclick="leerTexto(this.innerText)">0</div>
            <div class="casilla-destino" id="destino" ondragover="permitirSoltar(event)" ondrop="soltarSigno(event)">?</div>
            <div class="numero" id="num2" onclick="leerTexto(this.innerText)">0</div>
        </div>

        <div class="zona-signos" id="contenedor-signos">
            <div class="signo" id="mayor" draggable="true" ondragstart="arrastrar(event)" onclick="leerSigno('mayor')">&gt;</div>
            <div class="signo" id="menor" draggable="true" ondragstart="arrastrar(event)" onclick="leerSigno('menor')">&lt;</div>
        </div>

        <div class="controles">
            <button class="btn-accion" id="btn-siguiente" onclick="registrarYAvanzar()">Siguiente Nivel</button>
            <button class="btn-accion" id="btn-validar-final" onclick="validarTodoElJuego()">Validar Juego</button>
            <button class="btn-accion" id="btn-reiniciar-todo" onclick="reiniciarJuegoCompleto()">Volver a jugar</button>
        </div>

        <div id="mensaje"></div>
    </div>

    <script>
        // Niveles solicitados
        const niveles = [
            { n1: 100, n2: 60, correcto: ">" },
            { n1: 500, n2: 1000, correcto: "<" },
            { n1: 8000, n2: 5964, correcto: ">" },
            { n1: 5384, n2: 9769, correcto: "<" }
        ];

        let nivelActual = 0;
        let puntaje = 0;
        let signoSeleccionado = "";
        
        // Aquí guardaremos las respuestas que el alumno va colocando en cada nivel
        let respuestasUsuario = [];

        // Inicializar el juego
        cargarNivel();

        function cargarNivel() {
            // Re-mostrar la interfaz de juego por si venimos de un reinicio
            document.getElementById("area-comparacion").style.display = "flex";
            document.getElementById("contenedor-signos").style.display = "flex";
            document.getElementById("titulo-pantalla").innerText = `Nivel ${nivelActual + 1} de ${niveles.length}`;

            // Configurar números en la pantalla
            document.getElementById("num1").innerText = niveles[nivelActual].n1;
            document.getElementById("num2").innerText = niveles[nivelActual].n2;
            
            // Limpiar casilla de destino
            const destino = document.getElementById("destino");
            destino.innerText = "?";
            destino.style.backgroundColor = "#fafafa";
            signoSeleccionado = "";

            // Control de botones: Sólo avanza nivel por nivel
            document.getElementById("btn-siguiente").style.display = "inline-block";
            document.getElementById("btn-validar-final").style.display = "none";
            document.getElementById("btn-reiniciar-todo").style.display = "none";
            document.getElementById("mensaje").innerText = "";
        }

        function registrarYAvanzar() {
            if (signoSeleccionado === "") {
                leerTexto("Por favor, debes arrastrar un signo antes de continuar.");
                alert("¡Arrastra un signo primero!");
                return;
            }

            // Guardamos la respuesta del nivel actual
            respuestasUsuario[nivelActual] = signoSeleccionado;

            // Pasamos al siguiente nivel en la memoria
            nivelActual++;

            if (nivelActual < niveles.length) {
                // Si quedan niveles, cargamos el siguiente de inmediato sin validar aún
                cargarNivel();
            } else {
                // ¡Llegó al final de los niveles! Ahora toca validar todo
                pantallaDeValidacionFinal();
            }
        }

        function pantallaDeValidacionFinal() {
            document.getElementById("titulo-pantalla").innerText = "¡Has completado los ejercicios!";
            document.getElementById("mensaje").innerText = "Presiona el botón para revisar tus resultados.";
            document.getElementById("mensaje").style.color = "#333";
            
            // Ocultamos los números y signos para concentrarnos en el cierre
            document.getElementById("area-comparacion").style.display = "none";
            document.getElementById("contenedor-signos").style.display = "none";

            // Cambiamos el botón de Siguiente por el de Validar Juego
            document.getElementById("btn-siguiente").style.display = "none";
            document.getElementById("btn-validar-final").style.display = "inline-block";
            
            leerTexto("Has terminado de responder. Presiona el botón validar juego para saber tu puntaje.");
        }

        function validarTodoElJuego() {
            let aciertos = 0;

            // Comparamos cada respuesta guardada con la solución correcta
            for (let i = 0; i < niveles.length; i++) {
                if (respuestasUsuario[i] === niveles[i].correcto) {
                    aciertos++;
                }
            }

            // Cada acierto vale 10 puntos
            puntaje = aciertos * 10;
            document.getElementById("puntos").innerText = puntaje;

            const mensajeDiv = document.getElementById("mensaje");
            document.getElementById("btn-validar-final").style.display = "none";
            document.getElementById("btn-reiniciar-todo").style.display = "inline-block";

            // Si todas están buenas (4 niveles = 40 puntos)
            if (aciertos === niveles.length) {
                document.getElementById("titulo-pantalla").innerText = "¡Juego Perfecto! 🎉";
                mensajeDiv.innerText = `¡Excelente! Todas están buenas. Tu puntaje final es: ${puntaje} puntos.`;
                mensajeDiv.style.color = "green";
                leerTexto(`¡Excelente! Todas están buenas. Tu puntaje final es de ${puntaje} puntos. ¡Felicitaciones!`);
                
                // Explosión de confeti al estar todo correcto
                confetti({
                    particleCount: 180,
                    spread: 100,
                    origin: { y: 0.6 }
                });
            } else {
                // Si tuvo algún error
                document.getElementById("titulo-pantalla").innerText = "¡Puedes hacerlo mejor! 👍";
                mensajeDiv.innerText = `Lograste ${aciertos} de ${niveles.length} correctas. Tu puntaje final es: ${puntaje} puntos.`;
                mensajeDiv.style.color = "red";
                leerTexto(`Tu puntaje final es de ${puntaje} puntos. Tuviste algunos errores. ¡Presiona volver a jugar para mejorar!`);
            }
        }

        function reiniciarJuegoCompleto() {
            nivelActual = 0;
            puntaje = 0;
            respuestasUsuario = [];
            document.getElementById("puntos").innerText = puntaje;
            cargarNivel();
            leerTexto("¡Empecemos de nuevo! Pon mucha atención.");
        }

        // --- FUNCIONES DE VOZ (Web Speech API) ---
        function leerTexto(texto) {
            window.speechSynthesis.cancel();
            const lectura = new SpeechSynthesisUtterance(texto);
            lectura.lang = 'es-ES';
            window.speechSynthesis.speak(lectura);
        }

        function leerIndicaciones() {
            if (nivelActual >= niveles.length) {
                leerTexto("El juego ha terminado. Presiona el botón morado si deseas reiniciar todo el tablero.");
            } else {
                leerTexto("Arrastra el signo correcto al cuadro del centro. Cuando estés listo, presiona siguiente nivel. Evaluaremos todas tus respuestas al final.");
            }
        }

        function leerSigno(tipo) {
            if (tipo === 'mayor') leerTexto("Signo Mayor que");
            if (tipo === 'menor') leerTexto("Signo Menor que");
        }

        // --- FUNCIONES ARRASTRAR Y SOLTAR ---
        function arrastrar(ev) {
            ev.dataTransfer.setData("text", ev.target.innerText);
            leerSigno(ev.target.id);
        }

        function permitirSoltar(ev) {
            ev.preventDefault();
        }

        function soltarSigno(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            ev.target.innerText = data;
            signoSeleccionado = data;
            leerTexto(data === ">" ? "Colocaste Mayor que" : "Colocaste Menor que");
        }
    </script>
</body>
</html>
